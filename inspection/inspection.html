<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Inspection</title>
    <link rel="stylesheet" type="text/css" href="inspection.css">
    <link rel="stylesheet" type="text/css" href="../index/index.css">
</head>
<body>
    <!-- Navigation Bar -->
    <div class="navbar">
        <!-- Left: Menu and Logo -->
        <div class="left">
            <div class="menu">
                <a href="#">Menu</a>
            </div>
            <div class="logo">SpanSense</div>
        </div>
        <!-- Middle: Search Bar -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search bridges...">
            <div id="searchResults" class="search-results"></div>
        </div>
        <!-- Right: Night Mode Toggle and Account Links -->
        <div class="right">
            <div class="night-mode-toggle" id="nightModeToggle">
                <i class="fas fa-moon"></i> <!-- Moon icon for night mode -->
            </div>
            <div class="account-links">
                <a href="#">Account</a>
                <a href="#">Contact Us</a>
            </div>
        </div>
    </div>

    <!-- ✅ Add this element for displaying bridge name & number -->
    <h2 id="bridgeHeader">Loading...</h2>

    <button class="hello" title="hello">View uploaded photos</button>

    <div class="table-container">

        <!-- Add this new template for the button row -->
        <template id="templateButtonRow">
            <tr class="button-row" style="display: none;">
                <td colspan="5">
                    <button class="btn-add-defect">Add Defect</button>
                </td>
            </tr>
        </template>

        <template id="templateRow">
            <tr class="expandable-row" style="display: none;">
                <td colspan="5">
                    <div style="display: flex;">
                        <!-- Left Side: Defect Details -->
                        <table class="exp-table" style="flex: 1;">
                            <tbody>
                                <tr class="row">
                                    <td colspan="1">Defect</td>
                                    <td class="addDefect" colspan="5">Add</td>
                                </tr>
                                <tr class="row">
                                    <td colspan="1">Severity</td>
                                    <td class="addSeverity" colspan="5">Add</td>
                                </tr>
                                <tr class="row">
                                    <td colspan="1">Extent</td>
                                    <td class="addExtent" colspan="5">Add</td>
                                </tr>
                                <tr class="row">
                                    <td colspan="1">Works</td>
                                    <td class="addWorks" colspan="1">Add</td>
                                    <td colspan="1">Priority</td>
                                    <td class="addPriority" colspan="1">Add</td>
                                    <td colspan="1">Cost</td>
                                    <td class="addCost" colspan="1">Add</td>
                                </tr>
                                <tr class="row">
                                    <td colspan="1">Comment</td>
                                    <td class="addComment" colspan="5">Add</td>
                                </tr>
                                <td class="addRemedialWorks" hidden></td>
                                <td class="defectId" hidden></td>
                            </tbody>
                        </table>
        
                        <!-- Right Side: Normal Buttons -->
                        <div style="display: flex; flex-direction: column; align-items: flex-start; margin-left: 20px;">
                            <button class="normal-btn" title="Edit">Edit</button>
                            <button class="normal-btn" title="Delete">Delete</button>
                            <button onclick="openPhotoModal()" class="normal-btn view-photos" title="View">Photo</button>
                            <button class="normal-btn" title="Copy">Copy</button>
                        </div>
                    </div>
                </td>
            </tr>
        </template>

        
    </div>




    <div id="uploadModal-photo" class="modal-overlay-photo">
        <div class="modal-photo">
        <div class="modal-header-photo">
            <span>Upload Photos</span>
            <button class="close-btn-photo" onclick="closePhotoModal()">&times;</button>
        </div>

        <div id="previewContainer-photo" class="preview-container-photo">
            <label class="add-photo-photo" for="photoInput-photo">+</label>
            <input type="file" id="photoInput-photo" accept="image/*" onchange="previewImages()" />
        </div>

        <div class="modal-footer-photo">
            <button class="btn-photo btn-cancel" onclick="closePhotoModal()">CANCEL</button>
            <button type="button" class="btn-photo btn-upload" id="savePhotosBtn">SAVE</button>
        </div>
        </div>
    </div>

    <div id="gallery"></div>










    <!-- Modified section with button -->
    <div class="report-selector-container">
        <div class="selector-group">
            <div class="dropdown-wrapper">
                <label for="inspectionDates">Select Inspection Date:</label>
                <select id="inspectionDates">
                    <option value="">-- Select inspection date --</option>
                    <!-- Options populated dynamically -->
                </select>
            </div>
            <button class="load-btn" onclick="view()">
                Show Non-Empty Rows
            </button>
        </div>
    </div>

    <div class="result">
        <div class="stats-container">
            <div class="stat-card">
                <p>BCI Average (BCIav): <span id="bciAvResult"></span></p>
            </div>
            <div class="stat-card">
            <p>BCI Critical (BCIcrit): <span id="bciCritResult"></span></p>
            </div>
        </div>
        <!--  <button id="showArrayButton">Calculate BCI</button> -->
    </div>

    <!-- Add below your existing table -->
    <div id="historicalDefects" style="display: none;">
        <h3>Defects for Selected Date:</h3>
        <div id="defectsList"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
        <!-- Modal Header -->
        <div class="modal-header">
            <h2 id="modalTitle">Details</h2>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        <!-- Modal Body -->
        <div class="modal-body">
            <!-- Dropdowns -->
            <div class="form-group">
                <label for="defectType">Defect Type:</label>
                <select id="defectType">
                    <option value="1">1 Metalwork</option>
                    <option value="2">2 RC & prestressed concrete</option>
                    <option value="3">3 Masonry, brickwork & MC</option>
                    <option value="4">4 Paintwork & coatings</option>
                    <option value="5">5 Vegetation</option>
                    <option value="6">6 Foundation</option>
                    <option value="7">7 Invert, apron & riverbed</option>
                    <option value="8">8 Drainage</option>
                    <option value="9">9 Surfacing</option>
                    <option value="10">10 Expansion joints</option>
                    <option value="11">11 Embankments</option>
                    <option value="12">12 Bearings</option>
                    <option value="13">13 Impact damage</option>
                    <option value="14">14 Waterproofing</option>
                    <option value="15">15 Stone slab bridges</option>
                    <option value="16">16 Timber</option>
                </select>
            </div>
            <div class="form-group">
                <label for="defectNumber">Defect Number:</label>
                <select id="defectNumber">
                    <!-- Options will be dynamically populated here -->
                </select>
            </div>
            <div class="form-group">
            <label for="severity">Severity:</label>
            <select id="severity">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
            </div>


            <div class="form-group">
            <label for="extent">Extent:</label>
            <select id="extent">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
            </select>
            </div>
            <div class="form-group">
            <label for="works">Works:</label>
            <select id="works">
                <option value="N">No</option>
                <option value="Y">Yes</option>
                <option value="M">Monitor</option>
            </select>
            </div>

            <div class="form-group" id="priorityGroup" style="display: none;">
            <label for="priority">Priority:</label>
            <select id="priority">
                <option value="L">Low</option>
                <option value="M">Medium</option>
                <option value="H">High</option>
            </select>
            </div>
           <div class="form-group" id="costGroup" style="display: none;">
                <label for="cost">Cost:</label>
                <input type="number" id="cost" min="1" placeholder="Enter amount" class="no-spinners">
            </div>

            <div class="form-group" id="remedialWorksGroup" style="display: none;">
                <label for="remedialWorks">Remedial Works:</label>
                <textarea id="remedialWorks" rows="3" placeholder="Describe..." cols="40"></textarea>
            </div>

            <!-- Comment Field as a Textarea Instead of Dropdown -->
            <div class="form-group">
                <label for="comment">Comment:</label>
                <textarea id="comment" rows="3" placeholder="Enter your comment here..."></textarea>
            </div>
        </div>
        <!-- Modal Footer with Buttons -->
        <div class="modal-footer">
            <button class="btn btn-save" onclick="saveChanges()">Save</button>
            <button class="btn btn-back" onclick="closeModal()">Back</button>
        </div>
        </div>
    </div>


    <!-- Span Navigation Toggle -->
    <div class="span-navigation">
        <div class="span-toggles">
            <!-- Buttons will be added dynamically -->
        </div>
        <div class="span-content">
            <h3 id="current-span-title">Span 1 Elements</h3>
            <table id="inspectionElementsTable">
                <thead>
                    <tr>
                        <th class="itemno">No</th>
                        <th>Element Description</th>
                        <th>Severity</th>
                        <th>Extent</th>
                        <th>Defect</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be inserted dynamically -->
                </tbody>
            </table>
        </div>
    </div>


    <!-- In inspection.html -->
    <p>Selected Inspection Date: <span id="displayDate">No date selected</span></p>

    <button onclick="window.location.href = '../inspection1/inspection1.html';">Back</button> <!-- Button to go back to the main page -->
    <button class="btn btn-preview-inspection" id="previewInspection">Preview</button>
    <button class="btn btn-save-inspection" id="saveInspection">Save</button>


    <script src="inspection.js"></script>
    <script src="bci.js"></script>
    <script src="inspectionA.js"></script>
    <script src="spans.js"></script>
    <script src="photo.js"></script>

</body>
</html>
