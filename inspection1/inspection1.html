<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspection Details</title>
    <link rel="stylesheet" type="text/css" href="inspection1.css">
    <link rel="stylesheet" type="text/css" href="../index/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <!-- Left: Menu and Logo -->
        <div class="left">
            <div class="menu">
                <a href="#">Menu</a>
            </div>
            <div class="logo">SpanSense</div>
        </div>
        <!-- Middle: Search Bar -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search bridges...">
            <div id="searchResults" class="search-results"></div>
        </div>
        <!-- Right: Night Mode Toggle and Account Links -->
        <div class="right">
            <div class="night-mode-toggle" id="nightModeToggle">
                <i class="fas fa-moon"></i> <!-- Moon icon for night mode -->
            </div>
            <div class="account-links">
                <a href="#">Account</a>
                <a href="#">Contact Us</a>
            </div>
        </div>
    </div>


    <!-- ✅ Add this element for displaying bridge name & number -->
    <h2 id="bridgeHeader">Loading...</h2>



    <div class="container">
        <!-- Inspection Header -->
        <div class="inspection-header">
            <table>
                <tr>
                    <th>Inspection Date</th>
                    <td id="inspectionDate" onclick="date()">Select date</td>
                </tr>
                <tr>
                    <th>Inspection Type</th>
                    <td>
                        <div class="inspection-type">
                            <button class="inspection-type-btn" data-type="PI">PI</button>
                            <button class="inspection-type-btn" data-type="GI">GI</button>
                            <button class="inspection-type-btn" data-type="SI">SI</button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <th>Inspector Name</th>
                    <td><input  id="inspectorName" type="text" placeholder="Click to edit name"></td>
                </tr>
            </table>
        </div>

        <!-- Separator -->
        <div class="separator"></div>

        <!-- Existing Form Content -->
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
        <div class="span-tabs" id="span-tabs">
            <!-- Span tabs will be injected here by JavaScript -->
        </div>
        <div id="form-content">
            <!-- Form steps will be injected here by JavaScript -->
        </div>
        <div class="navigation">
            <button id="prev-btn" disabled>Previous</button>
            <button id="next-btn">Next</button>
        </div>
    </div>

    
    <button id="toIndex">Back</button>

    <button id="toBCI">Next</button>

    <script src="inspection1.js"></script>
</body>
</html>
