<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SpanSense</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0F1113;
    --surface: rgba(255,255,255,0.04);
    --line: rgba(255,255,255,0.08);
    --primary: #D6C3B3;
    --accent: #8FA3A6;
    --text: #EAE6E1;
    --text-secondary: rgba(234,230,225,0.7);
    --muted: rgba(234,230,225,0.45);
    --glow: rgba(143,163,166,0.3);
}

/* LIGHT MODE */
body.light {
    --bg: #E8E6E3;
    --surface: rgba(255,255,255,0.7);
    --line: rgba(0,0,0,0.08);
    --primary: #8B6B4F;
    --accent: #6F8A8D;
    --text: #2C2A28;
    --text-secondary: #5A5754;
    --muted: rgba(0,0,0,0.55);
    --glow: rgba(111,138,141,0.2);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    background: radial-gradient(circle at 30% 20%, #1A1D21, #0F1113 60%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

body.light {
    background: radial-gradient(circle at 30% 20%, #D9D6D1, #CBC7C1 90%);
}

/* FAINT GRID LINES */
.grid-lines {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.15;
}

.grid-lines::before {
    content: '';
    position: absolute;
    inset: 0;

    background-image: 
        repeating-linear-gradient(
            90deg,
            var(--line) 0px,
            var(--line) 1px,
            transparent 1px,
            transparent 80px
        );

    opacity: 0.12;
}

/* TOP NAVIGATION - MINIMAL */
.top-nav {
    position: fixed;
    top: 2rem;
    right: 2rem;
    display: flex;
    gap: 2rem;
    z-index: 100;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
}

.top-nav a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.3s ease;
    cursor: pointer;
}

.top-nav a:hover {
    color: var(--primary);
}

/* BRAND - moved to top left */
.brand {
    position: fixed;
    top: 2rem;
    left: 2rem;
    font-size: 1.25rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    transition: color 0.3s ease;
    z-index: 100;
}

/* AUTH PANEL - ENHANCED TRANSLUCENT */
.auth {
    position: fixed;
    right: 4rem;
    top: 50%;
    transform: translateY(-50%);
    width: 320px;
    z-index: 20;

    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);

    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 2.5rem;

    box-shadow:
        0 30px 60px rgba(0,0,0,0.4),
        inset 0 0 0 1px rgba(255,255,255,0.04);

    transition: all 0.3s ease;
}

body.light .auth {
    background: rgba(255,255,255,0.45);
    backdrop-filter: blur(30px);

    border: 1px solid rgba(0,0,0,0.08);

    box-shadow:
        0 20px 40px rgba(0,0,0,0.12),
        inset 0 0 0 1px rgba(255,255,255,0.5);
}

.auth:hover {
    transform: translateY(-50%) scale(1.015);
    box-shadow:
        0 40px 80px rgba(0,0,0,0.5),
        inset 0 0 0 1px rgba(255,255,255,0.06);
}

body.light .auth:hover {
    background: rgba(255, 255, 255, 0.8);
}

.auth h2 {
    font-size: 0.75rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2rem;
    transition: color 0.3s ease;
    font-weight: 500;
}

/* INPUTS */
.input {
    width: 100%;
    margin-bottom: 1.5rem;
}

.input input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 0.8rem 1rem;
    color: var(--text);
    font-size: 0.9rem;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
}

body.light .input input {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(0,0,0,0.1);
    color: #2C2A28;
}

.input input::placeholder {
    color: var(--muted);
    letter-spacing: 0.05em;
    font-size: 0.8rem;
}

.input input:focus {
    outline: none;
    border: 1px solid var(--primary);
    background: rgba(255,255,255,0.08);
}

/* BUTTONS */
.actions {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
}

button {
    flex: 1;
    padding: 0.8rem;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    cursor: pointer;
    transition: all 0.4s ease;
    font-weight: 500;
    backdrop-filter: blur(5px);
}

button:hover {
    background: rgba(255,255,255,0.15);
    transform: translateY(-2px);
    border-color: var(--primary);
}

body.light button {
    background: rgba(255,255,255,0.6);
    border-color: rgba(0,0,0,0.1);
    color: #2C2A28;
}

body.light button:hover {
    background: rgba(255,255,255,0.9);
    border-color: var(--primary);
    color: var(--primary);
}

/* TOGGLE BUTTON */
.mode-toggle {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid var(--line);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    z-index: 100;
    transition: all 0.3s ease;
}

.mode-toggle:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.15);
}

/* BOTTOM TEXT */
.bottom-text {
    position: fixed;
    bottom: 5rem;
    left: 3rem;
    max-width: 460px;
    z-index: 10;
    animation: slideUpFade 1s ease-out 0.5s forwards;
    opacity: 0;
}

.bottom-text h1 {
    font-size: 2rem;
    font-weight: 500;
    line-height: 1.2;
    margin: 0;
    color: var(--text);
    letter-spacing: -0.02em;
}

.bottom-text p {
    margin-top: 0.8rem;
    color: var(--text-secondary);
    font-size: 0.95rem;
    line-height: 1.6;
}

/* PARTNERS SECTION */
.partners {
    position: fixed;
    bottom: 2rem;
    left: 3rem;
    right: 3rem;
    display: flex;
    justify-content: center;
    gap: 3rem;
    z-index: 10;
    opacity: 0;
    animation: slideUpFade 1s ease-out 0.8s forwards;
    pointer-events: none;
}

.partner-logo {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 500;
    opacity: 0.5;
    transition: opacity 0.3s ease;
}

.partner-logo:hover {
    opacity: 0.8;
}

@keyframes slideUpFade {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MINIATURE BRIDGE - NO HOVER MOVEMENT */
.mini-bridge {
    position: fixed;
    left: 50%;
    top: 45%;
    transform: translate(-50%, -50%);
    width: 560px;
    height: 320px;
    z-index: 5;
    cursor: default;
    transition: none;
}


/* Pylons */
.bridge-pylon {
    position: absolute;
    bottom: 40px;
    width: 8px;
    height: 0;
    background: linear-gradient(to top, var(--primary), var(--accent));
    border-radius: 4px;
    animation: pylonRiseEnhanced 1s ease-out forwards;
    box-shadow: 0 0 10px var(--glow);
}

.pylon-left {
    left: 28%;
    animation-delay: 0.2s;
}

.pylon-right {
    right: 28%;
    animation-delay: 0.4s;
}

/* Cables */
.cable-group {
    position: absolute;
    width: 100%;
    height: 100%;
}

.cable {
    position: absolute;
    width: 2px;
    height: 0;
    background: linear-gradient(to bottom, var(--accent), transparent);
    transform-origin: top;
    animation: cableGrowEnhanced 0.8s ease-out forwards;
}

.cable-left {
    left: 28%;
    top: 0;
    transform: rotate(45deg);
    animation-delay: 0.6s;
}

.cable-right {
    right: 28%;
    top: 0;
    transform: rotate(-45deg);
    animation-delay: 0.7s;
}

.cable-center-left {
    left: 28%;
    top: 0;
    transform: rotate(20deg);
    animation-delay: 0.8s;
}

.cable-center-right {
    right: 28%;
    top: 0;
    transform: rotate(-20deg);
    animation-delay: 0.9s;
}

.cable-extra-left {
    left: 28%;
    top: 0;
    transform: rotate(10deg);
    animation-delay: 1s;
}

.cable-extra-right {
    right: 28%;
    top: 0;
    transform: rotate(-10deg);
    animation-delay: 1.1s;
}

/* Floating particles */
.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: radial-gradient(circle, var(--accent), transparent);
    border-radius: 50%;
    opacity: 0;
    animation: floatUpEnhanced 3s ease-in-out infinite;
    filter: blur(0.5px);
}

.particle-1 { left: 20%; bottom: 60px; animation-delay: 0s; width: 3px; height: 3px; }
.particle-2 { left: 35%; bottom: 80px; animation-delay: 0.5s; width: 5px; height: 5px; }
.particle-3 { left: 50%; bottom: 100px; animation-delay: 1s; width: 4px; height: 4px; }
.particle-4 { left: 65%; bottom: 80px; animation-delay: 1.5s; width: 3px; height: 3px; }
.particle-5 { left: 80%; bottom: 60px; animation-delay: 2s; width: 5px; height: 5px; }
.particle-6 { left: 45%; bottom: 70px; animation-delay: 0.8s; width: 4px; height: 4px; }
.particle-7 { left: 55%; bottom: 90px; animation-delay: 1.2s; width: 3px; height: 3px; }

/* Water reflection */
.water-reflection {
    position: absolute;
    bottom: 30px;
    left: 0;
    width: 100%;
    height: 20px;
    background: linear-gradient(to top, var(--glow), transparent);
    opacity: 0.3;
    pointer-events: none;
}

/* Bridge title */
.bridge-title {
    position: absolute;
    bottom: -60px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--text);
    opacity: 0;
    animation: fadeInUpEnhanced 1s ease-out 1.2s forwards;
    text-shadow: 0 0 10px var(--glow);
}

.bridge-subtitle {
    position: absolute;
    bottom: -90px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    opacity: 0;
    animation: fadeInUpEnhanced 1s ease-out 1.4s forwards;
}

/* Animations */
@keyframes pylonRiseEnhanced {
    from {
        height: 0;
        opacity: 0;
    }
    to {
        height: 140px;
        opacity: 1;
    }
}

@keyframes cableGrowEnhanced {
    from {
        height: 0;
        opacity: 0;
    }
    to {
        height: 140px;
        opacity: 0.6;
    }
}

@keyframes deckGlowEnhanced {
    0%, 100% {
        box-shadow: 0 0 20px var(--glow);
    }
    50% {
        box-shadow: 0 0 40px var(--glow);
    }
}

@keyframes deckLight {
    0% {
        transform: translateX(-100%);
        opacity: 0;
    }
    50% {
        transform: translateX(0);
        opacity: 1;
    }
    100% {
        transform: translateX(100%);
        opacity: 0;
    }
}

@keyframes floatUpEnhanced {
    0% {
        transform: translateY(0) scale(1);
        opacity: 0;
    }
    20% {
        opacity: 0.8;
        transform: translateY(-10px) scale(1.2);
    }
    80% {
        opacity: 0.8;
        transform: translateY(-60px) scale(1);
    }
    100% {
        transform: translateY(-80px) scale(0.5);
        opacity: 0;
    }
}

@keyframes rippleEnhanced {
    0%, 100% {
        transform: scaleX(1);
        opacity: 0.3;
    }
    50% {
        transform: scaleX(1.05);
        opacity: 0.5;
    }
}

@keyframes fadeInUpEnhanced {
    from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
}

/* Responsive */
@media (max-width: 768px) {
    .mini-bridge {
        width: 380px;
        height: 240px;
        top: 40%;
    }
    
    .bridge-pylon {
        width: 6px;
    }
    
    @keyframes pylonRiseEnhanced {
        to { height: 100px; }
    }
    
    @keyframes cableGrowEnhanced {
        to { height: 100px; }
    }
    
    .bridge-deck {
        bottom: 25px;
        height: 6px;
    }
    
    .bridge-title {
        font-size: 0.9rem;
        bottom: -50px;
    }
    
    .bridge-subtitle {
        font-size: 0.55rem;
        bottom: -75px;
    }
    
    .bottom-text {
        left: 2rem;
        bottom: 4rem;
        max-width: 320px;
    }
    
    .bottom-text h1 {
        font-size: 1.5rem;
    }
    
    .bottom-text p {
        font-size: 0.85rem;
    }
    
    .auth {
        right: 2rem;
        width: 280px;
        padding: 2rem;
        top: 60%;
    }
    
    .brand, .top-nav {
        top: 1rem;
    }
    
    .brand {
        left: 1rem;
        font-size: 0.7rem;
    }
    
    .top-nav {
        right: 1rem;
        gap: 1rem;
    }
    
    .partners {
        bottom: 1rem;
        gap: 1.5rem;
    }
    
    .partner-logo {
        font-size: 0.55rem;
    }
}

/* Cursor glow */
.cursor {
    position: fixed;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, var(--glow), transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease;
    z-index: 999;
    opacity: 0.5;
}
</style>
</head>

<body>

<!-- FAINT GRID LINES -->
<div class="grid-lines"></div>

<div class="brand">SPANSENSE</div>

<div class="top-nav">
    <a>ABOUT</a>
    <a>CONTACT</a>
    <a>CAREERS</a>
</div>

<div class="mini-bridge">
    <div class="bridge-deck"></div>
    <div class="bridge-pylon pylon-left"></div>
    <div class="bridge-pylon pylon-right"></div>
    
    <div class="cable-group">
        <div class="cable cable-left"></div>
        <div class="cable cable-right"></div>
        <div class="cable cable-center-left"></div>
        <div class="cable cable-center-right"></div>
        <div class="cable cable-extra-left"></div>
        <div class="cable cable-extra-right"></div>
    </div>
    
    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>
    <div class="particle particle-4"></div>
    <div class="particle particle-5"></div>
    <div class="particle particle-6"></div>
    <div class="particle particle-7"></div>
    
    <div class="water-reflection"></div>

    
    <div class="bridge-subtitle"></div>
</div>

<div class="auth">
    <h2>System Access</h2>

    <form id="loginForm" onsubmit="return false;">
        <div class="input">
            <input placeholder="ENGINEER ID" id="engineerId" autocomplete="username">
        </div>

        <div class="input">
            <input type="password" placeholder="SECURE KEY" id="secureKey" autocomplete="current-password">
        </div>

        <div class="actions">
            <button type="button" id="login">ENTER</button>
            <button type="button" onclick="next()">REGISTER</button>
        </div>
    </form>
</div>

<div class="bottom-text">
    <h1>Clarity across every span.</h1>
    <p>Inspection, reporting, and structural insight — unified into a single system.</p>
</div>

<div class="partners">
    <div class="partner-logo">ARUP</div>
    <div class="partner-logo">ATKINS</div>
    <div class="partner-logo">JACOBS</div>
    <div class="partner-logo">WSP</div>
    <div class="partner-logo">AECOM</div>
    <div class="partner-logo">MOTT MACDONALD</div>
</div>

<div class="mode-toggle" onclick="toggleMode()">🌓</div>
<div class="cursor" id="cursor"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    console.log('Page ready');
    
    const miniBridge = document.querySelector('.mini-bridge');
    const loginBtn = document.getElementById('login');
    
    // LOGIN HANDLER - NO ASYNC!
    loginBtn.onclick = function(event) {
        if (event) {
            event.preventDefault();
            event.stopPropagation();
        }
        
        console.log('===== LOGIN CLICKED =====');
        
        const username = document.getElementById('engineerId').value;
        const password = document.getElementById('secureKey').value;
        
        console.log('Username:', username);
        
        if (!username || !password) {
            alert('Please enter both Engineer ID and Secure Key');
            return false;
        }
        
        loginBtn.disabled = true;
        loginBtn.textContent = 'VERIFYING...';
        
        console.log('Fetching...');
        
        fetch('http://localhost:3000/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            credentials: 'include',
            body: JSON.stringify({username: username, password: password})
        })
        .then(function(response) {
            console.log('Got response:', response.status);
            return response.json();
        })
        .then(function(data) {
            console.log('Data:', data);
            
            if (data.success) {
                console.log('SUCCESS!');
                
                // Store
                localStorage.setItem('user', JSON.stringify(data.user));
                sessionStorage.setItem('user', JSON.stringify(data.user));
                console.log('Stored!');
                
                // Animate
                miniBridge.style.animation = 'bridgePulse 0.5s ease-in-out';
                
                // Redirect
                console.log('REDIRECTING!');
                window.location.href = '../index/index.html';
                
            } else {
                console.log('Login failed');
                alert('Access denied: ' + data.message);
                loginBtn.disabled = false;
                loginBtn.textContent = 'ENTER';
            }
        })
        .catch(function(err) {
            console.error('ERROR:', err);
            alert('Connection error!');
            loginBtn.disabled = false;
            loginBtn.textContent = 'ENTER';
        });
        
        return false;
    };
    
    // Enter key
    document.getElementById('secureKey').onkeydown = function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            loginBtn.click();
            return false;
        }
    };
    
    // Theme toggle
    window.toggleMode = function() {
        document.body.classList.toggle('light');
        localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    };
    
    // Load theme
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light');
    }
    
    // Cursor
    document.addEventListener('mousemove', function(e) {
        const cursor = document.getElementById('cursor');
        if (cursor) {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        }
    });
    
    // Register
    window.next = function() {
        alert('Registration coming soon!\nUsername: admin\nPassword: admin123');
        return false;
    };
    
    // Animation
    const style = document.createElement('style');
    style.textContent = '@keyframes bridgePulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.03); } }';
    document.head.appendChild(style);
});
</script>

</body>
</html>
